<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>State Logic Modeler Pro - Pyodide Final Fix</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        :root {
            --normal: #90EE90; --degraded: #ADD8E6; --failure: #FFCC99;
            --dark: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --sidebar: #ecf0f1;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        #header { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        #sidebar-vars { width: 300px; background: var(--sidebar); border-right: 2px solid #bdc3c7; padding: 15px; overflow-y: auto; }
        .var-table { width: 100%; margin-bottom: 20px; background: white; border-collapse: collapse; font-size: 12px; }
        .var-table th, .var-table td { border: 1px solid #ddd; padding: 6px; }
        .add-btn { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        #canvas-container { flex: 1; position: relative; background: white; }
        canvas { display: block; cursor: crosshair; }
        #data-hud { position: absolute; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.98); border: 2px solid var(--dark); padding: 15px; border-radius: 8px; width: 450px; max-height: 50vh; overflow-y: auto; font-size: 11px; }
        .matrix-table { border-collapse: collapse; width: 100%; text-align: center; margin-bottom: 15px; }
        .matrix-table td { border: 1px solid #ccc; padding: 4px; font-family: monospace; }
        .vector-box { background: #2c3e50; color: #2ecc71; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; }
        .py-result { margin-top: 10px; padding: 10px; background: #fdfce5; border: 1px solid #f1c40f; border-radius: 4px; font-weight: bold; }
        .modal { position: absolute; background: white; border-radius: 8px; display: none; z-index: 1000; width: 240px; border: 1px solid #ccc; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal label { display: block; margin-top: 10px; font-size: 11px; font-weight: bold; }
        .modal select, .modal input { width: 100%; margin-top: 5px; padding: 5px; box-sizing: border-box; }
        .btn-io { background: #7f8c8d; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight:bold">Markov Solver for PFD by Rafael Rocha</div>
    <div class="controls">
        <button class="btn-io" onclick="saveProject()">Salvar Projeto</button>
        <button class="btn-io" onclick="document.getElementById('fileInput').click()">Carregar Projeto</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadProject(event)">
        <button style="background:#e67e22; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold; margin-left:10px;" onclick="runPythonCalculation()">Calcular PFDavg (PyPFD)</button>
    </div>
</div>

<div id="main-container">
    <div id="sidebar-vars">
        <h4>Taxas (Rates)</h4>
        <table class="var-table" id="table-rates">
            <thead><tr><th>Nome</th><th>Valor</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="add-btn" onclick="addVariable('rates')">+ Add Taxa</button>
        <hr>
        <h4>Testes</h4>
        <table class="var-table" id="table-testes">
            <thead><tr><th>Nome</th><th>Valor</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="add-btn" onclick="addVariable('testes')">+ Add Teste</button>
        <p style="font-size: 10px; color: #7f8c8d; margin-top: 20px;">* Clique em um item e aperte <b>DEL</b> para remover.</p>
    </div>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
        <div id="data-hud">
            <h4>Matriz Simbólica</h4>
            <div id="matrix-ui"></div>
            <h4>Vetor de Estados</h4>
            <div id="status-vector-ui" class="vector-box">[]</div>
            <div id="python-output" class="py-result">Python: Inicializando...</div>
        </div>
    </div>
</div>

<div id="linkModal" class="modal">
    <label>Fórmula (Ex: λ_du*PDC):</label>
    <input type="text" id="m_l_val">
    <button onclick="applyLinkEdits()" style="width:100%; background:var(--accent); color:white; border:none; padding:8px; cursor:pointer; margin-top:10px;">Aplicar Link</button>
</div>

<div id="stateModal" class="modal">
    <label>Nome do Estado:</label>
    <input type="text" id="m_s_name">
    <label>Status:</label>
    <select id="m_s_status">
        <option value="Normal">Normal</option>
        <option value="Degraded">Degraded</option>
        <option value="Failure">Failure</option>
    </select>
    <button onclick="applyStateEdits()" style="width:100%; background:var(--accent); color:white; border:none; padding:8px; cursor:pointer; margin-top:10px;">Salvar Estado</button>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let states = [], links = [], variables = { 
        rates: [{n:'λ_du', v:0.00001}, {n:'λ_dd', v:0.0003}],
        testes: [{n:'T', v:12}] 
    };
    let selected = null, dragging = null, connecting = null, dragCP = null, mouse = {x:0, y:0};
    const COLORS = { Normal: '#90EE90', Degraded: '#ADD8E6', Failure: '#FFCC99' };

    let pyodide;
    async function loadPy() { 
        try {
            document.getElementById('python-output').innerText = "Python: Carregando Motor...";
            pyodide = await loadPyodide();
            await pyodide.loadPackage(["micropip","matplotlib"]);
            const micropip = pyodide.pyimport("micropip");
            document.getElementById('python-output').innerText = "Python: Instalando PyPFD...";
            //await micropip.install('PyPFD');
            await micropip.install('PyPFD');
            document.getElementById('python-output').innerText = "Python: Pronto (PyPFD Carregado)";
        } catch(e) { 
            console.error(e);
            document.getElementById('python-output').innerText = "Erro ao carregar bibliotecas Python"; 
        }
    }
    loadPy();

    function init() {
        window.addEventListener('resize', () => { 
            canvas.width = document.getElementById('canvas-container').clientWidth;
            canvas.height = document.getElementById('canvas-container').clientHeight;
        });
        window.dispatchEvent(new Event('resize'));

        // Atalho para Deletar
        window.addEventListener('keydown', e => {
            if((e.key === "Delete") && selected) {
                if(selected.uid) { // É um estado
                    links = links.filter(l => l.from !== selected.uid && l.to !== selected.uid);
                    states = states.filter(s => s !== selected);
                } else { // É um link
                    links = links.filter(l => l !== selected);
                }
                selected = null;
                updateDataViews();
            }
        });

        renderVariables();
        updateDataViews();
        requestAnimationFrame(renderLoop);
    }

    // --- Funções de IO ---
    function saveProject() {
        const data = JSON.stringify({ states, links, variables }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'markov_model.json';
        a.click();
    }

    function loadProject(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const content = JSON.parse(e.target.result);
            states = content.states || [];
            links = content.links || [];
            variables = content.variables || { rates: [], testes: [] };
            renderVariables();
            updateDataViews();
        };
        reader.readAsText(file);
    }

    function addVariable(type) {
        const prefix = type === 'rates' ? 'λ' : 'T';
        variables[type].push({ n: prefix + (variables[type].length + 1), v: 1 });
        renderVariables();
    }

    function renderVariables() {
        ['rates', 'testes'].forEach(type => {
            const tbody = document.querySelector(`#table-${type} tbody`);
            tbody.innerHTML = '';
            variables[type].forEach((v, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input type="text" value="${v.n}" onchange="variables.${type}[${i}].n=this.value; updateDataViews()"></td>
                                <td><input type="number" step="any" value="${v.v}" onchange="variables.${type}[${i}].v=parseFloat(this.value)"></td>
                                <td onclick="variables.${type}.splice(${i},1); renderVariables(); updateDataViews()" style="color:red; cursor:pointer">×</td>`;
                tbody.appendChild(tr);
            });
        });
    }

    canvas.addEventListener('mousedown', e => {
        const pos = {x:e.offsetX, y:e.offsetY};
        const cp = links.find(l => selected === l && Math.hypot(l.cp.x-pos.x, l.cp.y-pos.y) < 15);
        if(cp) { dragCP = cp; return; }
        const s = states.find(s => Math.hypot(s.x-pos.x, s.y-pos.y) < s.r);
        if(e.button === 0) { dragging = s; selected = s || getLinkHit(pos.x, pos.y); }
        else if(e.button === 2) { connecting = s; }
    });

    canvas.addEventListener('mousemove', e => {
        mouse = {x:e.offsetX, y:e.offsetY};
        if(dragging) { dragging.x = e.offsetX; dragging.y = e.offsetY; }
        if(dragCP) { dragCP.cp.x = e.offsetX; dragCP.cp.y = e.offsetY; }
    });

    window.addEventListener('mouseup', () => {
        if(connecting) {
            const target = states.find(s => Math.hypot(s.x-mouse.x, s.y-mouse.y) < s.r);
            if(target && target !== connecting) {
                links.push({from: connecting.uid, to: target.uid, val: "0", cp: {x:(connecting.x+target.x)/2, y:(connecting.y+target.y)/2-40}});
                updateDataViews();
            }
        }
        dragging = connecting = dragCP = null;
    });

    canvas.addEventListener('dblclick', e => {
        const id = states.length ? Math.max(...states.map(s=>s.id))+1 : 1;
        states.push({uid: Date.now(), x:e.offsetX, y:e.offsetY, id, value: "S"+id, status:'Normal', r:30});
        updateDataViews();
    });

    canvas.addEventListener('click', e => {
        const pos = {x:e.offsetX, y:e.offsetY};
        const s = states.find(s => Math.hypot(s.x-pos.x, s.y-pos.y) < s.r);
        const l = getLinkHit(pos.x, pos.y);
        document.getElementById('linkModal').style.display = 'none';
        document.getElementById('stateModal').style.display = 'none';
        if(s) {
            selected = s;
            document.getElementById('m_s_name').value = s.value;
            document.getElementById('m_s_status').value = s.status;
            const m = document.getElementById('stateModal');
            m.style.display = 'block'; m.style.left = e.clientX+'px'; m.style.top = e.clientY+'px';
        } else if(l) { 
            selected = l;
            document.getElementById('m_l_val').value = l.val;
            const m = document.getElementById('linkModal');
            m.style.display = 'block'; m.style.left = e.clientX+'px'; m.style.top = e.clientY+'px';
        }
    });

    function applyStateEdits() {
        if(selected && selected.uid) { 
            selected.value = document.getElementById('m_s_name').value;
            selected.status = document.getElementById('m_s_status').value;
            updateDataViews();
        }
        document.getElementById('stateModal').style.display = 'none';
    }

    function applyLinkEdits() { 
        if(selected && !selected.uid) { 
            selected.val = document.getElementById('m_l_val').value; 
            updateDataViews(); 
        }
        document.getElementById('linkModal').style.display='none'; 
    }

    function getLinkHit(x, y) {
        return links.find(l => {
            const s1 = states.find(s=>s.uid===l.from), s2 = states.find(s=>s.uid===l.to);
            if(!s1 || !s2) return false;
            const mid = getBezierPoint(0.5, s1, l.cp, s2);
            return Math.hypot(mid.x-x, mid.y-y) < 20;
        });
    }

    function getBezierPoint(t, p0, p1, p2) {
        return { x: (1-t)**2*p0.x + 2*(1-t)*t*p1.x + t**2*p2.x, y: (1-t)**2*p0.y + 2*(1-t)*t*p1.y + t**2*p2.y };
    }

    function updateDataViews() {
        const sorted = [...states].sort((a,b)=>a.id-b.id);
        let h = '<table class="matrix-table"><tr><th>ID</th>' + sorted.map(s=>`<th>${s.id}</th>`).join('') + '</tr>';
        sorted.forEach(r => {
            h += `<tr><td>${r.id}</td>`;
            sorted.forEach(c => {
                const l = links.find(li => li.from===r.uid && li.to===c.uid);
                h += `<td>${l ? l.val : '0'}</td>`;
            });
            h += '</tr>';
        });
        document.getElementById('matrix-ui').innerHTML = h + '</table>';
        document.getElementById('status-vector-ui').innerText = `[${sorted.map(s=>(s.status==='Failure'?0:1)).join(', ')}]`;
    }

    async function runPythonCalculation() {
        if (!pyodide) return alert("Pyodide ainda está carregando...");
        const sorted = [...states].sort((a, b) => a.id - b.id);
        const matrixData = sorted.map(r => sorted.map(c => {
            const l = links.find(li => li.from === r.uid && li.to === c.uid);
            return l ? String(l.val).trim() : "0";
        }));
        const state_v = sorted.map(s=>(s.status==='Failure'?0:1));
        const names_v = sorted.map(s => s.value);
        
        pyodide.globals.set("js_matrix_raw", matrixData);
        pyodide.globals.set("js_rates_vars", variables.rates);
        pyodide.globals.set("js_test_vars", variables.testes);
        pyodide.globals.set("js_state_vector", state_v);
        pyodide.globals.set("js_state_names",names_v);

        const pythonCode = `
import logging
import re
import matplotlib.pyplot as plt
import io
import base64
import numpy as np
from PyPFD import PyPFDMarkov



def solve_matrix():
    try:
        py_matrix = js_matrix_raw.to_py()
        py_rates = js_rates_vars.to_py()
        py_tests = js_test_vars.to_py()
        py_state_v = js_state_vector.to_py()
        py_names = js_state_names.to_py()

        py_rates = sorted(py_rates, key=lambda x: len(x['n']), reverse=True)
        py_tests = sorted(py_tests, key=lambda x: len(x['n']), reverse=True)

        print("------ Inicio - Dados de entrada")
        print(type(py_matrix))
        print(py_matrix)
        print(type(py_rates))
        print(py_rates)
        print(type(py_tests))
        print(py_tests)
        print(type(py_state_v))
        print(py_state_v)
        print(py_names)
        print("------ Fim    - Dados de entrada")

        contexto = {item['n']: item['v'] for item in py_rates} | {item['n']: 0.0 for item in py_tests}

        mkv_matrix = []
        for linha in py_matrix:
            nova_linha = []
            for formula in linha:
                # eval(expressao, globais, locais)
                # Passamos o 'contexto' como as variáveis locais disponíveis para a fórmula
                resultado = float(eval(formula, {}, contexto))
                nova_linha.append(resultado)
            mkv_matrix.append(nova_linha)


        linhas = len(mkv_matrix)
        colunas = len(mkv_matrix[0])
        
        
        #Normaliza as linhas
        for i in range(linhas):
            mkv_matrix[i][i] = 1
            for j in range(colunas):
                if i != j:
                    mkv_matrix[i][i] -= mkv_matrix[i][j] 


        tst_matrix = []
        tst_v = []

        #print(py_tests)
  
        for tst in py_tests:
            tstM = [[0 for j in range(colunas)] for i in range(linhas)]
            for i in range(linhas):
                for j in range(colunas):
                    if py_matrix[i][j] == tst['n']:
                        tstM[i][j] = 1

            for k in range(linhas):
                tstM[k][k] = 1
                for l in range(colunas):
                    if k != l:
                        tstM[k][k] -= tstM[k][l] 

            tst_matrix.append(tstM)
            tst_v.append(tst['v'])



        #print("------ Inicio - Mkv_Matrix")
        #print(mkv_matrix)
        #for linha in mkv_matrix:
        #    print(linha)
        #print("------ Fim    - Mkv_Matrix")

        #print("------ Inicio - Tst_Matrix")
        #print(tst_matrix)
        #for linha in tst_matrix:
        #    #print("T:")
        #    print(linha)
        #print("------ Fim    - Tst_Matrix")

        #print("------ Inicio - Tst_Vector")
        #print(tst_v)
        #print("------ Fim    - Tst_Matrix")
        

        for s in py_state_v:
            print(s)


        intervalos = 200
        maxT = 0

        for tmp in tst_v:
            if tmp > maxT:
                maxT = tmp

        pfd_avg = PyPFDMarkov.markov_cal_Ntest_plot(mkv_matrix,py_state_v,tst_matrix,tst_v,intervalos)
        
        mkv_pfd_avg = pfd_avg["pfdavg"]
        mkv_pltm = pfd_avg["stateMatrix"]
        tempos = pfd_avg["tempo"]


        print("---- Inicio geração do gráfico")

        # --- GERAÇÃO DO GRÁFICO ---        
        
        print("Tempo maximo:")
  
        # Cores baseadas no status (1 = OK, 0 = Falha)d
        cores = ['#90EE90' if s > 0.5 else '#FFCC99' for s in py_state_v]
   
        plt.figure(figsize=(12, 8))


        markers = ['.',",",'o',"1","2","3","4",'.',",",'o',"1","2","3","4",'.',",",'o',"1","2","3","4"]

        for i in range(len(py_state_v)):
            if py_state_v[i] == 0:
                vetor_coluna = [linha[i] for linha in mkv_pltm]
                probabilidade = vetor_coluna
                plt.plot(tempos, probabilidade, cores[i], marker=markers[i], markevery=50, linestyle='-', label=py_names[i])
            
        # Criao gráfico garantindo que os eixos coincidam
        
        
        
        # 3. Customização
        plt.title("Probabilidade de Falha Acumulada")
        plt.xlabel("Tempo (horas)")
        plt.ylabel("Probabilidade")
        plt.grid(True, linestyle='--', alpha=0.7)
        plt.legend()

        print("--2")
        # Converte para Base64
        buf = io.BytesIO()
        plt.savefig(buf, format='png', bbox_inches='tight')
        buf.seek(0)
        img_str = base64.b64encode(buf.read()).decode('utf-8')
        plt.close() # Limpa a memória do Matplotlib


        # Retorna um dicionário formatado como string para o JS
        import json
        return json.dumps({
            "pfd": f"{mkv_pfd_avg:.2e}",
            "grafico": f"data:image/png;base64,{img_str}"
        })



        
        #return f"{mkv_pfd_avg:.2e}"

    except Exception as e: return f"Erro Python: {str(e)}"
solve_matrix()`;
    try {
        document.getElementById('python-output').innerHTML = "Calculando...";
        const rawResult = await pyodide.runPythonAsync(pythonCode);
        
        if (rawResult.startsWith("Erro")) {
            document.getElementById('python-output').innerHTML = `<span style="color:red">${rawResult}</span>`;
            return;
        }

        const data = JSON.parse(rawResult);
        document.getElementById('python-output').innerHTML = `PFDavg: ${data.pfd}`;
        
        // Abre a nova janela com o gráfico
        abrirJanelaGrafico(data.grafico, data.pfd);

    } catch (err) { 
        console.error(err);
        document.getElementById('python-output').innerHTML = "Erro na execução.";
    }

    }

    function abrirJanelaGrafico(base64Image, pfdValue) {
        const win = window.open("", "_blank", "width=700,height=600");
        win.document.write(`
            <html>
                <head>
                    <title>Resultado Markov - PyPFD</title>
                    <style>
                        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
                        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
                        h2 { color: #2c3e50; }
                        .res { font-size: 20px; color: #e67e22; font-weight: bold; margin: 10px 0; }
                        img { max-width: 100%; border: 1px solid #ddd; border-radius: 5px; }
                        .signature {
                        position: fixed;
                        bottom: 10px;
                        left: 10px;
                        font-size: 10px;
                        color: #7f8c8d;
                        font-style: italic;
                        }
                    </style>
                </head>
                <body>
                    <div class="card">
                        <h2>Análise de no Tempo</h2>
                        <p class="res">PFDavg: ${pfdValue}</p>
                        <img src="${base64Image}" />
                        <br><br>
                        <button onclick="window.print()">Imprimir Relatório</button>
                    </div>
                    <div class="signature">by Rafael Rocha</div>
                </body>
            </html>
        `);
    }





    function renderLoop() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        links.forEach(l => {
            const s1 = states.find(s => s.uid === l.from), s2 = states.find(s => s.uid === l.to);
            if (!s1 || !s2) return;
            ctx.beginPath(); 
            ctx.moveTo(s1.x, s1.y);
            ctx.quadraticCurveTo(l.cp.x, l.cp.y, s2.x, s2.y);
            ctx.strokeStyle = (selected === l) ? '#e67e22' : '#bdc3c7';
            ctx.lineWidth = (selected === l) ? 3 : 2; 
            ctx.stroke();
            const pA = getBezierPoint(0.9, s1, l.cp, s2), pB = getBezierPoint(1.0, s1, l.cp, s2);
            const ang = Math.atan2(pB.y - pA.y, pB.x - pA.x);
            const arrowX = s2.x - s2.r * Math.cos(ang), arrowY = s2.y - s2.r * Math.sin(ang);
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(arrowX - 12 * Math.cos(ang - 0.4), arrowY - 12 * Math.sin(ang - 0.4));
            ctx.lineTo(arrowX - 12 * Math.cos(ang + 0.4), arrowY - 12 * Math.sin(ang + 0.4));
            ctx.closePath(); ctx.fillStyle = ctx.strokeStyle; ctx.fill();
            if (selected === l) {
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 1;
                ctx.fillRect(l.cp.x - 5, l.cp.y - 5, 10, 10); ctx.strokeRect(l.cp.x - 5, l.cp.y - 5, 10, 10);
            }
            const mid = getBezierPoint(0.5, s1, l.cp, s2);
            ctx.fillStyle = "#333"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
            ctx.fillText(l.val, mid.x, mid.y - 12);
        });
        if(connecting) { ctx.beginPath(); ctx.moveTo(connecting.x, connecting.y); ctx.lineTo(mouse.x, mouse.y); ctx.strokeStyle = "#3498db"; ctx.stroke(); }
        states.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = COLORS[s.status]; ctx.fill();
            ctx.strokeStyle = selected===s ? '#e67e22' : '#333'; ctx.lineWidth = selected===s ? 4 : 1; ctx.stroke();
            ctx.fillStyle = "#000";
            ctx.textAlign = "center";
            ctx.font = "bold 12px Arial";
            ctx.fillText(s.value, s.x, s.y - 2); 
            ctx.font = "10px Arial";
            ctx.fillText("ID: " + s.id, s.x, s.y + 12); 
        });
        requestAnimationFrame(renderLoop);
    }

    canvas.oncontextmenu = e => e.preventDefault();
    init();
</script>
</body>
</html>
